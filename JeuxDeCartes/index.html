<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeux de Cartes - Hub</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: radial-gradient(1200px 600px at 80% -10%, #2a203a 0%, #0f1115 55%);
      }
      .game-card {
        background: linear-gradient(160deg, #1a1f2e 10%, #0d121a 100%);
        border-color: #30384a;
      }
      .badge {
        background-color: rgba(162, 142, 255, 0.18);
        border: 1px solid rgba(162, 142, 255, 0.35);
        color: #d6c8ff;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        text-decoration: none;
        font-weight: 500;
        margin-bottom: 2rem;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <a href="../index.html" class="back-link">
        <span>←</span> Retour au Hub
      </a>
      
      <header class="hero">
        <p class="overline">Collection</p>
        <h1>Jeux de Cartes</h1>
        <p class="subtitle">Les grands classiques, revisités pour le web.</p>
      </header>

      <section class="games" id="games-list" aria-label="Liste des jeux de cartes" aria-busy="true">
        <p id="games-status" class="games-status">Chargement de la collection…</p>
      </section>

      <template id="game-card-template">
        <a class="game-card" rel="noopener noreferrer">
          <div class="game-content">
            <span class="badge"></span>
            <h2></h2>
            <p></p>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </template>
    </main>

    <script>
      (async function renderGames() {
        const list = document.getElementById("games-list");
        const template = document.getElementById("game-card-template");
        const status = document.getElementById("games-status");

        try {
          const response = await fetch("./cards-games.json", { cache: "no-cache" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const games = await response.json();
          const fragment = document.createDocumentFragment();
          games.forEach((game) => {
            const node = template.content.firstElementChild.cloneNode(true);
            node.href = game.href;
            if (game.href === "#") {
              node.style.opacity = "0.6";
              node.style.cursor = "not-allowed";
              node.onclick = (e) => e.preventDefault();
            }
            node.setAttribute("aria-label", `Lancer ${game.title}`);
            node.querySelector(".badge").textContent = game.badge;
            node.querySelector("h2").textContent = game.title;
            node.querySelector("p").textContent = game.description;
            fragment.appendChild(node);
          });

          status?.remove();
          list.appendChild(fragment);
          list.setAttribute("aria-busy", "false");
        } catch (error) {
          console.error("[CardHub] Error:", error);
          if (status) {
            status.textContent = "Erreur lors du chargement des jeux.";
            status.classList.add("is-error");
          }
        }
      })();
    </script>
  </body>
</html>
