<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Piano Tiles — Reflex</title>
    <meta name="description" content="Tape les tuiles noires, évite les blanches et bats ton meilleur score." />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <main class="app">

      <div class="page-header">
        <a href="../" class="back-link">← Hub</a>
        <span class="game-badge">JEU 06</span>
      </div>

      <div class="hero-wrap">
        <h1 class="hero-title">
          <span class="title-solid">PIANO</span>
          <span class="title-stroke">TILES</span>
        </h1>
        <p class="hero-sub">Tape uniquement les tuiles noires avant qu'elles ne passent la ligne.</p>
      </div>

      <!-- ── Stats + Input ── -->
      <section class="topbar">
        <label class="field" for="player-name">
          <span class="field-label">Pseudo</span>
          <input id="player-name" type="text" maxlength="20" placeholder="Ton prénom" />
        </label>
        <div class="stats" aria-live="polite">
          <div class="stat-block">
            <span class="stat-label">Score</span>
            <strong id="score-value" class="stat-val">0</strong>
          </div>
          <div class="stat-block">
            <span class="stat-label">Best</span>
            <strong id="best-value" class="stat-val">0</strong>
          </div>
          <div class="stat-block">
            <span class="stat-label">Vitesse</span>
            <strong id="speed-value" class="stat-val">1.00x</strong>
          </div>
          <div class="stat-block">
            <span class="stat-label">Combo</span>
            <strong id="combo-value" class="stat-val accent">0</strong>
          </div>
        </div>
      </section>

      <!-- ── Game Board ── -->
      <section class="game-panel">
        <div id="board" class="board" aria-label="Plateau Piano Tiles" role="button" tabindex="0">
          <div class="lane-grid" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <div id="tiles-layer" class="tiles-layer"></div>
          <div id="hit-line" class="hit-line" aria-hidden="true"></div>
          <div id="judgement-feedback" class="judgement-feedback" aria-live="polite"></div>

          <div id="overlay" class="overlay">
            <p class="overlay-kicker">Piano Tiles</p>
            <h2 id="overlay-title">Prêt ?</h2>
            <p id="overlay-text">Clique sur Démarrer puis tape les colonnes 1-2-3-4 ou directement à l'écran.</p>
            <button id="start-btn" class="btn-start" type="button">Démarrer</button>
          </div>
        </div>
      </section>

      <!-- ── Leaderboard ── -->
      <section class="leaderboard-panel">
        <div class="leaderboard-head">
          <span class="field-label">Top global</span>
          <button id="refresh-top-btn" class="btn-refresh" type="button">Rafraîchir</button>
        </div>
        <ol id="leaderboard-list" class="leaderboard-list">
          <li>Aucune donnée pour le moment.</li>
        </ol>
        <p id="status" class="status-text">Prêt.</p>
      </section>

    </main>

    <script src="../api-shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
