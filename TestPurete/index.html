<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Test de Pureté</title>
    <meta name="description" content="Teste ton niveau de pureté avec un quiz original et local." />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <main class="app">
      <div class="page-header">
        <a href="../" class="back-link">← Hub</a>
        <span class="game-badge">JEU 04</span>
      </div>

      <!-- ── Setup ── -->
      <section class="setup-section">
        <div class="hero-wrap">
          <h1 class="hero-title">
            <span class="title-solid">TEST DE</span>
            <span class="title-stroke">PURETÉ</span>
          </h1>
          <p class="hero-sub">3 modes, points de pénalité/récup, et questions par thème.</p>
        </div>

        <div class="setup-panel">
          <label class="field-wrap">
            <span class="field-label">Prénom (optionnel)</span>
            <input id="player-name" type="text" maxlength="24" placeholder="Ton prénom" />
          </label>

          <div class="mode-block">
            <span class="field-label">Mode</span>
            <div id="mode-grid" class="mode-grid" role="radiogroup" aria-label="Mode du test">
              <button class="mode-btn is-active" data-mode="court" type="button">Court 25+</button>
              <button class="mode-btn" data-mode="normal" type="button">Normal 50+</button>
              <button class="mode-btn" data-mode="long" type="button">Long 100+</button>
            </div>
          </div>

          <button id="start-quiz-btn" class="btn-cta" type="button">
            <span>Commencer le test</span>
            <span class="btn-arrow" aria-hidden="true">↗</span>
          </button>
        </div>
      </section>

      <!-- ── Quiz ── -->
      <section id="quiz-panel" class="quiz-panel hidden" aria-live="polite">
        <div class="quiz-header">
          <div class="quiz-meta">
            <span id="theme-badge" class="theme-badge">Thème</span>
            <p id="progress-text" class="progress-text">1 / 120</p>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <p id="question-text" class="question-text"></p>

        <div class="answer-actions">
          <button id="answer-no-btn" class="btn-no" type="button">Non</button>
          <button id="answer-yes-btn" class="btn-yes" type="button">Oui</button>
        </div>
      </section>

      <!-- ── Result ── -->
      <section id="result-panel" class="result-panel hidden" aria-live="polite">
        <div class="result-header">
          <p id="result-title" class="result-title">Score de pureté</p>
          <p id="result-score" class="result-score">100</p>
        </div>

        <div class="meter">
          <div id="meter-fill" class="meter-fill"></div>
        </div>

        <p id="empathy-score" class="empathy-score"></p>
        <p id="result-message" class="result-message"></p>
        <p id="result-breakdown" class="result-breakdown"></p>

        <div class="radar-wrap">
          <p class="radar-legend">
            <span class="legend-dot legend-dot-purity"></span> Pureté par thème
            <span class="legend-dot legend-dot-empathy"></span> Empathie par thème
          </p>
          <canvas id="theme-radar" width="520" height="320" aria-label="Radar des thèmes"></canvas>
        </div>

        <div class="result-actions">
          <button id="restart-btn" class="btn-ghost" type="button">Recommencer</button>
          <button id="copy-result-btn" class="btn-secondary" type="button">Copier le résultat</button>
        </div>
      </section>
    </main>

    <script src="../api-shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
