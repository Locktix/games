<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games Hub</title>
    <meta
      name="description"
      content="Hub centralisé pour lancer rapidement mes deux jeux."
    />
    <meta property="og:title" content="Games Hub" />
    <meta
      property="og:description"
      content="Hub centralisé pour lancer rapidement mes deux jeux."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://locktix.github.io/games/" />
    <meta property="og:image" content="https://locktix.github.io/games/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Games Hub" />
    <meta
      name="twitter:description"
      content="Hub centralisé pour lancer rapidement mes deux jeux."
    />
    <meta name="twitter:image" content="https://locktix.github.io/games/favicon.svg" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./shared.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="overline">Bienvenue</p>
        <h1>Games Hub</h1>
        <p class="subtitle">Choisis un jeu et lance-toi en un clic.</p>
      </header>

      <section class="games" id="games-list" aria-label="Liste des jeux" aria-busy="true">
        <p id="games-status" class="games-status">Chargement des jeux…</p>
      </section>

      <template id="game-card-template">
        <a class="game-card" rel="noopener noreferrer">
          <div class="game-content">
            <span class="badge"></span>
            <h2></h2>
            <p></p>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </template>
    </main>

    <script>
      (async function renderGames() {
        const list = document.getElementById("games-list");
        const template = document.getElementById("game-card-template");
        const status = document.getElementById("games-status");

        try {
          const response = await fetch("./games.json", { cache: "no-cache" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const games = await response.json();
          if (!Array.isArray(games) || games.length === 0) {
            throw new Error("Aucun jeu disponible.");
          }

          const fragment = document.createDocumentFragment();
          games.forEach((game) => {
            const node = template.content.firstElementChild.cloneNode(true);
            node.href = game.href;
            node.setAttribute("aria-label", `Ouvrir le jeu ${game.title}`);
            node.querySelector(".badge").textContent = game.badge;
            node.querySelector("h2").textContent = game.title;
            node.querySelector("p").textContent = game.description;
            fragment.appendChild(node);
          });

          status?.remove();
          list.appendChild(fragment);
          list.setAttribute("aria-busy", "false");
        } catch (error) {
          console.error("[GamesHub] Impossible de charger games.json", error);
          list.setAttribute("aria-busy", "false");
          if (status) {
            status.textContent =
              "Impossible de charger la liste des jeux. Rafraîchis la page.";
            status.classList.add("is-error");
          }
        }
      })();
    </script>
  </body>
</html>
